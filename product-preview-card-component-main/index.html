<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- displays site properly based on user's device -->
        <link href="./styles.css" rel="stylesheet" type="text/css" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"
        />

        <title>Frontend Mentor | Product preview card component</title>
    </head>
    <body>
        <main>
            <picture>
                <source
                    srcset="./images/image-product-desktop.jpg"
                    media="(width > 768px)"
                />
                <source
                    srcset="./images/image-product-mobile.jpg"
                    media="(width <= 768px)"
                />
                <img
                    src="./images/image-product-mobile.jpg"
                    alt="parfum image"
                />
            </picture>
            <section>
                <h2 class="uppercase text-preset-4 grey">perfume</h2>
                <h1 class="text-preset-1">Gabrielle Essence Eau De Parfum</h1>
                <p class="text-preset-3 grey">
                    A floral, solar and voluptuous interpretation composed by
                    Olivier Polge, Perfumer-Creator fro the House of CHANEL
                </p>
                <p class="green-500 text-preset-1 vertical-align-top">
                    $149.99
                    <del class="grey text-preset-5">$169.99</del>
                </p>
                <button class="white">
                    <img src="./images/icon-cart.svg" alt="cart icon" />Add to
                    Cart
                </button>
            </section>
        </main>
    </body>
</html>
