<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- displays site properly based on user's device -->

        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/images/favicon-32x32.png"
        />

        <title>Frontend Mentor | Blog preview card</title>

        <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,500..800;1,500..800&family=Outfit:wght@500..800&display=swap");
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html {
                --yellow: hsl(47, 88%, 63%);
                --white: hsl(0, 0%, 100%);
                --gray-900: hsl(0, 0%, 7%);
                --gray-500: hsl(0, 0%, 42%);
                --body-font-size: 16px;
                --sml-pad: 5px;
                --gap-size: 20px;
                --header-font-size: 1.6rem;
                --mb-header-font-size: 1.3rem;

                --avatar-dimension: 32px;

                --author-gap: 10px;

                --bd-radius: 15px;
                --sml-bd-radius: 10px;
                --xt-sml-bd-radius: 5px;

                --shadow-size: 6px;

                /* desktop article sizes */
                --ds-card-width: 384px;
                --ds-card-height: 522px;
                /* mobile article sizes */
                --mb-card-width: 327px;
                --mb-card-height: 501px;
            }
            body {
                background-color: var(--yellow);
                color: var(--gray-900);
                font-size: var(--body-font-size);
                height: 100dvh;
                width: 100dwh;
                display: grid;
                place-items: center;

                font-family: "FigTree", sans-serif;
            }

            article {
                display: flex;
                flex-direction: column;
                gap: var(--gap-size);

                width: min(var(--mb-card-width), calc(100% - 48px));
            }

            article,
            img {
                border-radius: var(--sml-bd-radius);
            }

            h1 {
                font-size: var(--mb-header-font-size);
            }

            @media (min-width: 720px) {
                article {
                    width: var(--ds-card-width);
                }

                h1 {
                    font-size: var(--header-font-size);
                }
            }

            article {
                background-color: var(--white);
                padding: var(--gap-size);
                border: 1px solid var(--gray-900);
                box-shadow: var(--shadow-size) var(--shadow-size)
                    var(--gray-900);
            }

            .chip {
                background-color: var(--yellow);
                padding: 5px 10px;
                border-radius: var(--xt-sml-bd-radius);
                font-weight: 700;
            }

            .date {
                display: block;
            }

            .blog-content,
            .blog-body {
                display: flex;
                flex-direction: column;
                gap: var(--gap-size);
                width: 100%;
            }

            .blog-body p {
                color: var(--gray-500);
            }

            .author {
                display: flex;
                flex-direction: row;
                align-items: center;
                font-weight: 700;
                gap: var(--author-gap);
            }

            .author img {
                width: var(--avatar-dimension);
            }

            h1:hover {
                color: var(--yellow);
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <article>
            <img
                src="./assets/images/illustration-article.svg"
                alt="blog thumbnail"
            />
            <section class="blog-content">
                <div><span class="chip">Learning</span></div>
                <div><h5 class="date">Published 21 Dec 2023</h5></div>
                <div class="blog-body">
                    <h1><a>HTML & CSS Foundations</a></h1>
                    <p>
                        These languages are the backbone of every website,
                        defining structure, content, and presentation.
                    </p>
                </div>
            </section>
            <section class="author">
                <img src="assets/images/image-avatar.webp" alt="Greg avatar" />
                <span>Greg Hooper</span>
            </section>
        </article>
    </body>
</html>
