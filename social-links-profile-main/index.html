<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- displays site properly based on user's device -->

        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/images/favicon-32x32.png"
        />

        <title>Frontend Mentor | Social links profile</title>

        <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap");

            *,
            ::before,
            ::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --green: hsl(75, 94%, 57%);
                --white: hsl(0, 0%, 100%);
                --gray-900: hsl(0, 0%, 8%);
                --gray-800: hsl(0, 0%, 12%);
                --gray-700: hsl(0, 0%, 20%);

                --mobile-width: 375px;
                --desktop-width: 1440px;

                --body-font-size: 14px;

                --sml-rounding: 5px;

                --avatar-size: 125px;

                --no-padding: 0px;
                --min-padding: 10px;
                --average-space: 20px;
            }

            body {
                font-family: "Inter", sans-serif;
                background-color: var(--gray-900);
                display: grid;
                place-items: center;
                font-size: var(--body-font-size);
                color: var(--white);
                height: 100dvh;
                text-align: center;
            }

            .green {
                color: var(--green);
            }

            .white {
                color: var(--white);
            }

            .mt-15 {
                margin-top: 15px;
            }

            .user-info > h1 {
                margin-top: 20px;
                font-weight: 400;
            }

            .user-info h2 {
                padding-top: var(--min-padding);
            }

            .user-info p {
                font-weight: 600;
                padding-top: var(--min-padding);
            }

            ul {
                list-style-type: none;
                display: flex;
                flex-direction: column;

                font-weight: 600;
                gap: 15px;
            }

            ul a {
                padding: 10px 0;
                text-decoration: none;
                color: var(--white);
                background-color: var(--gray-700);
                display: inline-block;
                width: 100%;
                border-radius: var(--sml-rounding);
            }

            ul a:hover {
                color: var(--gray-800);
                background-color: var(--green);
            }

            figure {
                width: min(320px, calc(100% - 48px));
                background-color: var(--gray-800);
                padding: var(--average-space);
                border-radius: var(--sml-rounding);
            }

            figcaption {
                display: flex;
                flex-direction: column;
                gap: var(--average-space);
            }

            figure img {
                border-radius: 50%;
                width: var(--avatar-size);
            }
        </style>
    </head>
    <body>
        <figure>
            <img src="./assets/images/avatar-jessica.jpeg" alt="user avatar" />
            <figcaption>
                <div class="user-info">
                    <h1>Jessica Randall</h1>
                    <p class="green">London, United Kingdom</p>
                </div>

                <p>"Front-end developer and avid reader."</p>
                <ul>
                    <li><a href="#">GitHub</a></li>
                    <li><a href="#">Frontend Mentor</a></li>
                    <li><a href="#">LinkedIn</a></li>
                    <li><a href="#">Twitter</a></li>
                    <li><a href="#">Instagram</a></li>
                </ul>
            </figcaption>
        </figure>
    </body>
</html>
